<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asadbek | JJK Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; transition: 0.5s; }
        
        /* Fon va Canvaslar */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #snow-canvas { z-index: 1; pointer-events: none; }
        #canvas-3d { position: absolute; z-index: 5; display: none; }
        #jjk-canvas { position: absolute; z-index: 6; display: none; transform: scaleX(-1); }
        #input_video { display: none !important; }

        /* Navigation */
        #main-content { height: 100vh; width: 100%; position: relative; z-index: 100; }
        .page { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }
        .nav-btn { position: fixed; top: 50%; transform: translateY(-50%); font-size: 45px; color: #0f0; cursor: pointer; z-index: 1000; text-shadow: 0 0 15px #0f0; }
        #nextBtn { right: 10px; } #prevBtn { left: 10px; display: none; }

        /* UI Elementlar */
        .cyber-panel { border: 1px solid #0f0; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; width: 320px; margin: 10px; position: relative; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #0f0; margin-bottom: 15px; }
        .card { width: 250px; padding: 12px; margin: 5px; border: 1px solid #0f0; color: #fff; text-decoration: none; display: flex; align-items: center; border-radius: 8px; background: rgba(0,255,0,0.1); }
        
        /* JJK UI */
        #jjk-ui { position: absolute; top: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid #a0f; border-radius: 10px; z-index: 1001; font-family: monospace; }
        #kanji-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: #a0f; display: none; z-index: 1002; text-shadow: 0 0 30px #fff; }

        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>
    <div id="canvas-3d"></div>
    <canvas id="jjk-canvas"></canvas>
    <video id="input_video"></video>

    <div id="main-content">
        <i class="fas fa-chevron-left nav-btn" id="prevBtn" onclick="movePage(-1)"></i>
        <i class="fas fa-chevron-right nav-btn" id="nextBtn" onclick="movePage(1)"></i>

        <div class="page active" id="p1">
            <img src="https://img.freepik.com/free-vector/hacker-operating-laptop-cartoon-icon-illustration_138676-2387.jpg" class="avatar">
            <h2 style="color:#0f0; letter-spacing: 3px;">ASADBEK</h2>
            <a href="#" class="card"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="#" class="card"><i class="fab fa-telegram"></i> Telegram</a>
        </div>

        <div class="page" id="p2">
            <div class="cyber-panel">
                <audio id="myAudio" controls><source src="https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/Elvin%20Mirz%C9%99zad%C9%99%20-%20D%C3%BC%C5%9F%C3%BCn%20M%C9%99ni.mp3"></audio>
                <video id="mainVideo" width="100%" style="margin-top:10px;"><source src="https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/VID_20260217_042543_562.mp4"></video>
            </div>
        </div>

        <div class="page" id="p3">
            <div class="cyber-panel">
                <input type="text" placeholder="Ismingiz" style="width:100%; margin-bottom:10px; padding:8px;">
                <textarea placeholder="Xabar" style="width:100%; height:80px; padding:8px;"></textarea>
                <button style="width:100%; padding:10px; background:#0f0; border:none; font-weight:bold; cursor:pointer;">YUBORISH</button>
            </div>
        </div>

        <div class="page" id="p4">
            <h3 style="color:#0f0; position:absolute; top:30px;">SOLAR SYSTEM CONTROL</h3>
        </div>

        <div class="page" id="p5">
            <div id="jjk-ui">AYTING: "RYOIKI TENKAI"</div>
            <div id="kanji-overlay">無量空処</div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let jjkActive = false;
        let isVoiceActive = false;
        let currentTechnique = "";

        // Ovozli buyruqlarni aniqlash
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            const speech = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Speech:", speech);
            
            if (speech.includes("ryoiki") || speech.includes("domain") || speech.includes("infinite")) {
                currentTechnique = "gojo";
                activateVoice();
            } else if (speech.includes("shrine") || speech.includes("mizushi") || speech.includes("sukuna")) {
                currentTechnique = "sukuna";
                activateVoice();
            } else if (speech.includes("purple") || speech.includes("murasaki")) {
                currentTechnique = "purple";
                activateVoice();
            }
        };

        function activateVoice() {
            isVoiceActive = true;
            document.getElementById('jjk-ui').innerText = "VOICE CONFIRMED! SHOW HAND SIGN";
            document.getElementById('jjk-ui').style.borderColor = "cyan";
            setTimeout(() => { isVoiceActive = false; document.getElementById('jjk-ui').innerText = "WAITING FOR VOICE..."; }, 6000);
        }

        // --- 5-BO'LIM JJK LOGIKASI ---
        const jjkCanvas = document.getElementById('jjk-canvas');
        const jjkCtx = jjkCanvas.getContext('2d');
        jjkCanvas.width = window.innerWidth; jjkCanvas.height = window.innerHeight;

        function onResultsJJK(results) {
            if (!jjkActive) return;
            jjkCtx.save();
            jjkCtx.clearRect(0, 0, jjkCanvas.width, jjkCanvas.height);
            jjkCtx.translate(jjkCanvas.width, 0); jjkCtx.scale(-1, 1);
            jjkCtx.drawImage(results.image, 0, 0, jjkCanvas.width, jjkCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && isVoiceActive) {
                const lm = results.multiHandLandmarks[0];
                const d8_12 = Math.hypot(lm[8].x - lm[12].x, lm[8].y - lm[12].y); // Index & Middle

                if (currentTechnique === "gojo" && d8_12 < 0.03) {
                    triggerEffect("無量空処", "#a0f", lm[8]);
                } else if (currentTechnique === "sukuna") {
                    triggerEffect("伏魔御廚子", "#f00", lm[12]);
                }
            }
            jjkCtx.restore();
        }

        function triggerEffect(txt, color, pos) {
            isVoiceActive = false;
            const kanji = document.getElementById('kanji-overlay');
            kanji.innerText = txt;
            kanji.style.color = color;
            kanji.style.display = "block";
            document.body.style.animation = "shake 0.5s infinite";
            
            setTimeout(() => {
                kanji.style.display = "none";
                document.body.style.animation = "";
            }, 3000);
        }

        // --- NAVIGATION & INITIALIZATION ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
        hands.onResults((res) => {
            if(currentPage === 4) onResultsSolar(res);
            if(currentPage === 5) onResultsJJK(res);
        });

        const cam = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 1280, height: 720
        });

        function movePage(s) {
            document.getElementById('p'+currentPage).classList.remove('active');
            currentPage += s;
            document.getElementById('p'+currentPage).classList.add('active');
            
            document.getElementById('prevBtn').style.display = (currentPage==1)?'none':'block';
            document.getElementById('nextBtn').style.display = (currentPage==5)?'none':'block';

            jjkActive = (currentPage === 5);
            document.getElementById('jjk-canvas').style.display = jjkActive ? 'block' : 'none';
            document.getElementById('canvas-3d').style.display = (currentPage === 4) ? 'block' : 'none';

            if(currentPage >= 4) { cam.start(); if(jjkActive) recognition.start(); }
        }

        // Snow & Clock (Old)
        setInterval(() => { /* Clock logic */ }, 1000);
        // Solar System Init (Bo'sh joy qoldirildi, oldingi kodingizni bu yerga paste qiling)
    </script>
</body>
</html>
