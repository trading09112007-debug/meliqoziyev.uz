<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asadbek | meliqoziyev.uz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #snow-canvas { z-index: 1; pointer-events: none; } 
        #canvas-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; background: #000; }
        #input_video { display: none; }
        #main-content { height: 100vh; width: 100%; position: relative; z-index: 100; }
        .page { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .active { display: flex; }
        .cyber-panel { border: 1px solid #0f0; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 15px; width: 100%; max-width: 340px; margin: 10px 0; position: relative; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .cyber-panel::before { content: attr(data-label); position: absolute; top: -10px; left: 15px; background: #000; color: #0f0; font-size: 11px; padding: 0 8px; border: 1px solid #0f0; text-transform: uppercase; letter-spacing: 1px; }
        video { width: 100%; border-radius: 8px; border: 1px solid rgba(0,255,0,0.5); }
        audio { width: 100%; height: 40px; filter: invert(100%) hue-rotate(90deg) brightness(1.5); margin-top: 5px; }
        .c-btn { background: none; border: 1px solid #0f0; color: #0f0; padding: 5px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 18px; }
        .c-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }
        .nav-btn { position: fixed; top: 50%; transform: translateY(-50%); font-size: 45px; color: #0f0; cursor: pointer; z-index: 1000; text-shadow: 0 0 15px #0f0; }
        #nextBtn { right: 10px; } #prevBtn { left: 10px; display: none; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #0f0; margin-bottom: 15px; box-shadow: 0 0 15px #0f0; }
        .card { width: 260px; padding: 10px; margin: 6px 0; border-radius: 10px; text-decoration: none; color: #fff; font-weight: bold; display: flex; align-items: center; background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; transition: 0.3s; }
        #cam-status { position: absolute; top: 60px; color: #0f0; font-family: monospace; z-index: 1001; }
        .start-cam-btn { padding: 10px 20px; background: #0f0; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; z-index: 1002; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>
    <video id="input_video" playsinline></video>
    <div id="canvas-3d"></div>

    <div id="main-content">
        <i class="fas fa-chevron-left nav-btn" id="prevBtn" onclick="movePage(-1)"></i>
        <i class="fas fa-chevron-right nav-btn" id="nextBtn" onclick="movePage(1)"></i>

        <div class="page active" id="p1">
            <img src="https://img.freepik.com/free-vector/hacker-operating-laptop-cartoon-icon-illustration_138676-2387.jpg" class="avatar">
            <h2 style="color:#0f0; margin-bottom:10px; letter-spacing: 3px;">ASADBEK</h2>
            <a href="https://instagram.com/ezz_mafiya" class="card"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://t.me/Pain_2007" class="card"><i class="fab fa-telegram"></i> Telegram</a>
        </div>

        <div class="page" id="p2">
            <div id="big-time" style="font-size: 24px; color: #0f0; font-family: monospace; margin-bottom: 10px;">00:00:00</div>
            <div class="cyber-panel" data-label="Video Player">
                <video id="mainVideo" controls>
                    <source id="videoSrc" src="https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/VID_20260217_042543_562.mp4" type="video/mp4">
                </video>
                <div style="display:flex; justify-content: space-between; margin-top:10px;">
                    <button class="c-btn" onclick="changeVideo(-1)"><i class="fas fa-backward"></i></button>
                    <button class="c-btn" onclick="changeVideo(1)"><i class="fas fa-forward"></i></button>
                </div>
            </div>
        </div>

        <div class="page" id="p3">
            <div class="cyber-panel" data-label="Contact">
                <input type="text" placeholder="Ismingiz">
                <textarea placeholder="Xabaringiz..."></textarea>
                <button class="c-btn" style="width:100%; margin-top:10px;">YUBORISH</button>
            </div>
        </div>

        <div class="page" id="p4">
            <h3 style="color:#0f0; position:absolute; top:20px; font-family: monospace;">KOINOTNI BOSHQARISH</h3>
            <div id="cam-status">Kamera yuklanmoqda...</div>
            <button id="manual-cam-btn" class="start-cam-btn" onclick="startCameraManual()">KAMERANI YOQISH</button>
        </div>
    </div>

    <script>
        // VIDEO RO'YXATI
        const video = document.getElementById('mainVideo');
        const videoSrc = document.getElementById('videoSrc');
        const videos = [
            "https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/VID_20260217_042543_562.mp4",
            "https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/VID_20260301_001120_168.mp4",
            "https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/VID_20260302_180350_682.mp4",
            "https://raw.githubusercontent.com/meliqoziyevuz/Asadbek/main/VID_20260302_234650_212.mp4"
        ];
        let currentVid = 0;
        function changeVideo(dir) {
            currentVid = (currentVid + dir + videos.length) % videos.length;
            videoSrc.src = videos[currentVid];
            video.load(); video.play();
        }

        // KOINOT (THREE.JS)
        let scene, camera3d, renderer, stars, starGeo, camActive = false;
        function initKoinot() {
            scene = new THREE.Scene();
            camera3d = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera3d.position.z = 1; camera3d.rotation.x = Math.PI/2;
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-3d').innerHTML = "";
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            starGeo = new THREE.BufferGeometry();
            let pos = new Float32Array(5000 * 3);
            for(let i=0; i<15000; i++) pos[i] = Math.random() * 600 - 300;
            starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.8}));
            scene.add(stars);
        }

        function animateKoinot() {
            let p = starGeo.attributes.position.array;
            for(let i=0; i<5000; i++) {
                p[i*3+2] += (stars.userData.speed || 0.5);
                if (p[i*3+2] > 200) p[i*3+2] = -200;
            }
            starGeo.attributes.position.needsUpdate = true;
            renderer.render(scene, camera3d);
            if(camActive) requestAnimationFrame(animateKoinot);
        }

        // AI HANDS
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5 });
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const lm = res.multiHandLandmarks[0];
                stars.rotation.y = (lm[8].x - 0.5) * 2;
                const dist = Math.sqrt(Math.pow(lm[4].x-lm[20].x, 2) + Math.pow(lm[4].y-lm[20].y, 2));
                stars.userData.speed = dist * 8;
                document.getElementById('cam-status').innerText = "SYSTEM: ONLINE";
            }
        });

        const camControl = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });

        async function startCameraManual() {
            document.getElementById('cam-status').innerText = "Ruxsat so'ralmoqda...";
            try {
                await camControl.start();
                document.getElementById('manual-cam-btn').style.display = 'none';
                document.getElementById('cam-status').innerText = "SYSTEM: CONNECTED";
                camActive = true;
                animateKoinot();
            } catch (err) {
                document.getElementById('cam-status').innerText = "XATO: Ruxsat berilmadi!";
                alert("Kameraga ruxsat bering va saytni yangilang!");
            }
        }

        function movePage(s) {
            let curr = document.querySelector('.page.active');
            let n = parseInt(curr.id.replace('p', '')) + s;
            if(n<1 || n>4) return;
            curr.classList.remove('active'); document.getElementById('p'+n).classList.add('active');
            document.getElementById('prevBtn').style.display = (n==1)?'none':'block';
            document.getElementById('nextBtn').style.display = (n==4)?'none':'block';
            if(n === 4) {
                document.getElementById('canvas-3d').style.display = 'block';
                initKoinot();
                // Avtomatik urinish
                startCameraManual();
            } else {
                document.getElementById('canvas-3d').style.display = 'none';
                camActive = false;
            }
        }

        // QOR VA VAQT
        const sCanvas = document.getElementById('snow-canvas');
        const sCtx = sCanvas.getContext('2d');
        sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight;
        let snow = [];
        for(let i=0; i<100; i++) snow.push({x: Math.random()*sCanvas.width, y: Math.random()*sCanvas.height, r: Math.random()*2+1, s: Math.random()*1+0.5});
        function drawSnow() {
            sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
            sCtx.fillStyle = "white";
            snow.forEach(p => {
                sCtx.beginPath(); sCtx.arc(p.x, p.y, p.r, 0, Math.PI*2); sCtx.fill();
                p.y += p.s; if(p.y > sCanvas.height) p.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }
        drawSnow();
        setInterval(() => { document.getElementById('big-time').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
