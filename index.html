<!DOCTYPE html>
<html>
<body>
    <video id="v" autoplay playsinline style="width: 100%; height: 100vh; transform: scaleX(-1);"></video>
    <script>
        const v = document.getElementById('v');
        // Kamerani majburiy so'rash
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { v.srcObject = stream; })
            .catch(err => { alert("Kamera ishlamadi: " + err); });
    </script>
</body>
</html>
