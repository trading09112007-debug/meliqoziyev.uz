<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Jujutsu Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; align-items: center; justify-content: center; }
        .active { display: flex; }
        #video-element { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transform: scaleX(-1); object-fit: cover; display: none; }
        #orb { position: fixed; width: 150px; height: 150px; border-radius: 50%; filter: blur(40px); z-index: 10; pointer-events: none; transition: 0.1s; }
        .controls { position: fixed; bottom: 20px; z-index: 20; }
    </style>
</head>
<body>

    <video id="video-element"></video>
    <div id="orb"></div>

    <div id="p1" class="page active"><h1>1-Sahifa: Asadbek</h1></div>
    <div id="p5" class="page"><h1>5-Sahifa: Jujutsu Mode</h1></div>

    <button style="position:fixed; top:20px; z-index:100;" onclick="next()">Keyingi</button>

    <script>
        let cur = 1;
        const orb = document.getElementById('orb');
        const video = document.getElementById('video-element');

        // Effekt boshqaruvi
        function updateOrb(x, y, type) {
            orb.style.display = 'block';
            orb.style.left = (x - 75) + 'px';
            orb.style.top = (y - 75) + 'px';
            orb.style.background = (type === 'gojo') ? 'radial-gradient(#a0f, transparent)' : 'radial-gradient(#f00, transparent)';
        }

        // Mouse/Touch bilan ishlash (Kamera ishlamasa ham ishlaydi)
        document.addEventListener('mousemove', (e) => {
            if(cur === 5) updateOrb(e.clientX, e.clientY, 'gojo');
        });

        // MediaPipe Hands
        const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.onResults(res => {
            if(cur === 5 && res.multiHandLandmarks?.length > 0) {
                const lm = res.multiHandLandmarks[0];
                updateOrb(lm[0].x * window.innerWidth, lm[0].y * window.innerHeight, 'gojo');
            }
        });

        const cam = new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 });

        function next() {
            document.getElementById('p'+cur).classList.remove('active');
            cur = (cur === 5) ? 1 : 5;
            document.getElementById('p'+cur).classList.add('active');
            
            if(cur === 5) {
                video.style.display = 'block';
                cam.start().catch(e => console.log("Kamera bloklandi"));
            } else {
                video.style.display = 'none';
                cam.stop();
                orb.style.display = 'none';
            }
        }
    </script>
</body>
</html>
