<!DOCTYPE html>
<html lang="uz">
<head>
    <style>
        /* ... (Eski stillar) ... */
        #canvas-3d { display: none; background: radial-gradient(circle, #001 0%, #000 100%); }
        .space-info { position: absolute; bottom: 20px; color: #0f0; font-family: monospace; width: 100%; text-align: center; z-index: 1002; }
    </style>
</head>
<body>
    <div class="page" id="p4">
        <h3 style="color:#0f0; position:absolute; top:20px; width:100%; text-align:center; z-index:1001; font-family: monospace;">SYSTEM: DEEP SPACE EXPLORATION</h3>
        <div class="space-info">Qo'lingiz bilan yulduzlarni boshqaring</div>
    </div>

    <script>
        /* ... (Video, Audio, Snow va boshqa JS kodlaringiz o'zgarishsiz qoladi) ... */

        // KOINOT LOGIKASI (THREE.JS YANGILANDI)
        let scene, camera3d, renderer, stars, camActive = false;
        let starGeo, starCount = 5000;

        function initKoinot() {
            scene = new THREE.Scene();
            camera3d = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera3d.position.z = 1;
            camera3d.rotation.x = Math.PI/2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-3d').innerHTML = ""; // Tozalash
            document.getElementById('canvas-3d').appendChild(renderer.domElement);

            starGeo = new THREE.BufferGeometry();
            let positions = new Float32Array(starCount * 3);
            let velocities = [];

            for(let i=0; i<starCount; i++) {
                positions[i*3] = Math.random() * 600 - 300;
                positions[i*3+1] = Math.random() * 600 - 300;
                positions[i*3+2] = Math.random() * 600 - 300;
                velocities.push(0.5 + Math.random());
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            let starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true });
            stars = new THREE.Points(starGeo, starMaterial);
            stars.userData = { velocities: velocities };
            scene.add(stars);
        }

        // HAND TRACKING (KOINOT UCHUN)
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const lm = res.multiHandLandmarks[0];
                
                // Qo'l holatiga qarab burilish
                stars.rotation.y = (lm[8].x - 0.5) * 2;
                stars.rotation.z = (lm[8].y - 0.5) * 2;

                // Masofa (Yaqinlashish effekti)
                const dist = Math.sqrt(Math.pow(lm[4].x-lm[20].x, 2) + Math.pow(lm[4].y-lm[20].y, 2));
                stars.userData.speed = dist * 5; 
            } else {
                stars.userData.speed = 0.2;
            }
        });

        function animateKoinot() {
            let positions = starGeo.attributes.position.array;
            let speed = stars.userData.speed || 0.2;

            for(let i=0; i<starCount; i++) {
                positions[i*3+2] += speed; // Z o'qi bo'yicha yulduzlar uchib keladi
                if (positions[i*3+2] > 200) positions[i*3+2] = -200;
            }
            starGeo.attributes.position.needsUpdate = true;
            stars.rotation.x += 0.002;
            
            renderer.render(scene, camera3d);
            if(camActive) requestAnimationFrame(animateKoinot);
        }

        // NAVIGATION YANGILANDI
        function movePage(s) {
            let curr = document.querySelector('.page.active');
            let n = parseInt(curr.id.replace('p', '')) + s;
            if(n<1 || n>4) return;
            curr.classList.remove('active'); document.getElementById('p'+n).classList.add('active');
            
            document.getElementById('prevBtn').style.display = (n==1)?'none':'block';
            document.getElementById('nextBtn').style.display = (n==4)?'none':'block';

            if(n === 4) {
                document.getElementById('canvas-3d').style.display = 'block';
                if(!camActive) { 
                    initKoinot(); 
                    const camAI = new Camera(document.getElementById('input_video'), { 
                        onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); }, 
                        width: 640, height: 480 
                    });
                    camAI.start(); 
                    camActive = true; 
                    animateKoinot(); 
                }
            } else {
                document.getElementById('canvas-3d').style.display = 'none';
            }
        }
    </script>
</body>
</html>
